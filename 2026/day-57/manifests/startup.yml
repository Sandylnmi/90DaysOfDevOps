apiVersion: v1
kind: Pod
metadata:
  name: startup-pod
spec:
  containers:
  - name: busybox-startup
    image: busybox
    command: ["/bin/sh", "-c", "sleep 20 && touch /tmp/started && sleep 3600"]
    startupProbe:
      exec:
        command: ["cat", "/tmp/started"]
      periodSeconds: 5  
      failureThreshold: 2
        #      failureThreshold: 12  
    livenessProbe:
      exec:
        command:
          - cat
          - /tmp/started
      periodSeconds: 5
      failureThreshold: 3    

