apiVersion: v1
kind: Pod
metadata:
  name: readiness-pod
  labels:
    app: readiness-app
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10

