apiVersion: v1
kind: Pod
metadata:
  name: oom-killed
spec:
  containers:
  - name: stress-container
    image: polinux/stress
    resources:
      limits:
        memory: "100Mi"
        cpu: "100m"  
      requests:
        memory: "50Mi"
        cpu: "50m"  
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]

